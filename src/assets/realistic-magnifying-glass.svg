<svg width="256px" height="256px" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="handleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8C5B3F;" />  <stop offset="50%" style="stop-color:#A67B5B;" /> <stop offset="100%" style="stop-color:#8C5B3F;" /> </linearGradient>

    <linearGradient id="rimGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4B4B4B;" />  <stop offset="50%" style="stop-color:#1E1E1E;" /> <stop offset="100%" style="stop-color:#000000;" /> </linearGradient>

    <radialGradient id="lensGradient">
      <stop offset="0%" style="stop-color:white; stop-opacity:0.4;" />
      <stop offset="100%" style="stop-color:white; stop-opacity:0.1;" />
    </radialGradient>

    <filter id="soft-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="5" stdDeviation="3" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <g filter="url(#soft-shadow)">
    <path d="M 68 68 L 85 85 C 90 90, 90 90, 95 85 L 85 75 Z" fill="url(#handleGradient)" />
    
    <circle cx="40" cy="40" r="30" fill="none" stroke="url(#rimGradient)" stroke-width="12" />
    
    <circle cx="40" cy="40" r="30" fill="url(#lensGradient)" fill-opacity="0.9" />
    
    <path d="M 20 25 A 25 25, 0, 0, 1, 55 20" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.7" />
  </g>
</svg>